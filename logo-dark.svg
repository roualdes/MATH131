<svg xmlns="http://www.w3.org/2000/svg" width="760" height="180" viewBox="0 0 760 180" role="img" aria-labelledby="title desc">
  <title id="title">MATH 131 wordmark for dark backgrounds</title>
  <desc id="desc">A modern text-only MATH 131 wordmark using a blue to orange gradient.</desc>
  <defs>
  <linearGradient id="gradText" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1D4ED8"/>
    <stop offset="48%" stop-color="#0EA5E9"/>
    <stop offset="100%" stop-color="#F97316"/>
  </linearGradient>
  <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <style>
    .wordmark {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 850;
      letter-spacing: -0.045em;
      font-size: 92px;
    }
    .accent {
      font-weight: 760;
      letter-spacing: -0.035em;
    }
  </style>
</defs>
  <g filter="url(#softShadow)">
    <text x="380" y="114" text-anchor="middle" class="wordmark" fill="url(#gradText)" stroke="#E0F2FE" stroke-width="1.15" stroke-opacity="0.18" paint-order="stroke fill">
      MATH <tspan class="accent">131</tspan>
    </text>
  </g>
</svg>
